name: standard-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test on Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
    defaults:
      run:
        working-directory: standard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: standard/package-lock.json

      - run: npm ci

      - name: Build (emits dist/ for build-output contract tests)
        run: npm run build

      - name: Unit + contract suite
        run: npm test

      - name: Conformance runner (all)
        run: npm run validate:examples

      - name: Conformance runner (L1)
        run: npm run validate:examples -- --level=1

      - name: Conformance runner (L2)
        run: npm run validate:examples -- --level=2

      - name: Conformance runner (L3)
        run: npm run validate:examples -- --level=3
